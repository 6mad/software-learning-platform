<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件学习平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* 顶部导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .nav-link.primary {
            background: white;
            color: #667eea;
        }

        .nav-link.primary:hover {
            background: #f0f0f0;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .user-name {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        /* 主要内容区域 */
        .main-content {
            flex: 1;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* 软件网格 */
        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .software-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .software-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .software-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .software-card h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1.6em;
            font-weight: 600;
        }

        .software-card .version {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .software-card .version::before {
            content: "📦";
        }

        .software-card .description {
            color: #555;
            line-height: 1.7;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .software-card .type {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .start-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        /* 加载和错误状态 */
        .loading, .error {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: rgba(255, 100, 100, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }

            .nav-left {
                flex-direction: column;
                width: 100%;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
            }

            .nav-link {
                flex: 1;
                text-align: center;
            }

            .user-menu {
                width: 100%;
                justify-content: center;
            }

            .software-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo">🖥️ 软件学习平台</div>
                <div class="nav-links">
                    <a href="/" class="nav-link primary">首页</a>
                    <a href="/forum" class="nav-link">💬 论坛</a>
                </div>
            </div>
            <div class="user-menu" id="user-menu">
                <!-- 动态内容 -->
            </div>
        </nav>

        <!-- 主要内容 -->
        <div class="main-content">
            <div class="header">
                <h1>通过模拟操作学习软件</h1>
                <p>选择一个软件开始你的学习之旅</p>
            </div>
            <div id="software-list" class="software-grid">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 加载软件列表
        async function loadSoftwareList() {
            try {
                const response = await fetch('/api/software');
                const result = await response.json();

                if (result.success) {
                    displaySoftwareList(result.data);
                } else {
                    showError('加载失败: ' + result.error);
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            }
        }

        // 显示软件列表
        function displaySoftwareList(softwareList) {
            const container = document.getElementById('software-list');

            if (softwareList.length === 0) {
                container.innerHTML = '<div class="error">暂无可用的软件配置</div>';
                return;
            }

            container.innerHTML = softwareList.map(software => `
                <div class="software-card" onclick="startLearning('${software.id}')">
                    <h3>${software.name}</h3>
                    <div class="version">版本 ${software.version}</div>
                    <div class="description">${software.description || '暂无描述'}</div>
                    <span class="type">${getTypeLabel(software.type)}</span>
                    <button class="start-button">开始学习</button>
                </div>
            `).join('');
        }

        // 获取类型标签
        function getTypeLabel(type) {
            const typeLabels = {
                'image_processing': '图像处理',
                'video_editor': '视频编辑',
                'audio_editor': '音频编辑',
                'text_editor': '文本编辑',
                'general': '通用软件'
            };
            return typeLabels[type] || type;
        }

        // 开始学习
        function startLearning(softwareId) {
            window.location.href = `/software/${softwareId}`;
        }

        // 显示错误
        function showError(message) {
            const container = document.getElementById('software-list');
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        // 更新用户菜单
        async function updateUserMenu() {
            const container = document.getElementById('user-menu');

            try {
                const response = await fetch('/api/auth/check');
                const data = await response.json();

                if (data.success && data.data.logged_in) {
                    const user = data.data.user;
                    const avatar = user.username.charAt(0).toUpperCase();

                    let menuHtml = `
                        <div class="user-avatar">${avatar}</div>
                        <div class="user-name">${user.username}</div>
                        <a href="/logout" class="nav-link" onclick="logout(event)">退出</a>
                    `;

                    // 如果是管理员，添加管理后台链接
                    if (user.role === 'admin') {
                        menuHtml = `
                            <div class="user-avatar">${avatar}</div>
                            <div class="user-name">${user.username}</div>
                            <a href="/admin" class="nav-link">⚙️ 管理后台</a>
                            <a href="/logout" class="nav-link" onclick="logout(event)">退出</a>
                        `;
                    }

                    container.innerHTML = menuHtml;
                } else {
                    container.innerHTML = `
                        <a href="/login" class="nav-link primary">登录</a>
                    `;
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
                container.innerHTML = `
                    <a href="/login" class="nav-link primary">登录</a>
                `;
            }
        }

        // 退出登录
        async function logout(event) {
            event.preventDefault();
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                console.error('退出登录失败:', error);
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            loadSoftwareList();
            updateUserMenu();
        });
    </script>
</body>
</html>
